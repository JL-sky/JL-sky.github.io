</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> requests<span class="comment">#请求服务器获取网页数据</span></span><br><span class="line"><span class="keyword">from</span> bs4 <span class="keyword">import</span> BeautifulSoup <span class="keyword">as</span> bs<span class="comment">#解析数据</span></span><br><span class="line"><span class="keyword">import</span> re<span class="comment">#正则匹配</span></span><br><span class="line"><span class="keyword">import</span> jieba.analyse<span class="comment">#分词包,提取关键词</span></span><br><span class="line"><span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt<span class="comment">#画图函数</span></span><br><span class="line"><span class="comment"># import matplotlib</span></span><br><span class="line"><span class="keyword">from</span> wordcloud <span class="keyword">import</span> WordCloud<span class="comment">#词云包，显示词频统计</span></span><br><span class="line"></span><br><span class="line">url=<span class="string">&quot;https://movie.douban.com/cinema/nowplaying/zhengzhou/&quot;</span></span><br><span class="line">headers=&#123;<span class="string">&quot;User-Agent&quot;</span>: <span class="string">&quot;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.163 Safari/537.36 Edg/80.0.361.111&quot;</span>&#125;</span><br><span class="line">res=requests.get(url,headers=headers)<span class="comment">#封装网页向服务器发送请求</span></span><br><span class="line">html=res.text<span class="comment">#将服务前返回的数据转码为字符串</span></span><br><span class="line">soup=bs(html,<span class="string">&quot;html.parser&quot;</span>)<span class="comment">#解析请求数据</span></span><br><span class="line"><span class="comment"># print(soup)</span></span><br><span class="line">nowplaying_movie=soup.find(<span class="string">&quot;ul&quot;</span>,class_=<span class="string">&quot;lists&quot;</span>)<span class="comment">#获取包含电影id及名称的标签</span></span><br><span class="line"><span class="comment"># print(nowplaying_movie)</span></span><br><span class="line">nowplaying_movie_list=nowplaying_movie.find_all(<span class="string">&quot;li&quot;</span>,class_=<span class="string">&quot;list-item&quot;</span>)<span class="comment">#获取最新电影列表信息</span></span><br><span class="line"><span class="comment"># print(nowplaying_movie_list)</span></span><br><span class="line"></span><br><span class="line">nowplaying_list=[]</span><br><span class="line"><span class="keyword">for</span> item <span class="keyword">in</span> nowplaying_movie_list:</span><br><span class="line">    nowplaying_dict=&#123;&#125;<span class="comment">#存储每一部电影的id号和名称</span></span><br><span class="line">    nowplaying_dict[<span class="string">&#x27;id&#x27;</span>]=item[<span class="string">&#x27;data-subject&#x27;</span>]</span><br><span class="line">    <span class="keyword">for</span> img_item <span class="keyword">in</span> item.find_all(<span class="string">&quot;img&quot;</span>):</span><br><span class="line">        nowplaying_dict[<span class="string">&#x27;name&#x27;</span>]=img_item[<span class="string">&#x27;alt&#x27;</span>]</span><br><span class="line">    nowplaying_list.append(nowplaying_dict)</span><br><span class="line"></span><br><span class="line"><span class="comment"># for i in nowplaying_list:</span></span><br><span class="line"><span class="comment">#     print(i)</span></span><br><span class="line">    <span class="comment"># 27619748</span></span><br><span class="line"></span><br><span class="line">num=<span class="number">1</span></span><br><span class="line"><span class="keyword">for</span> item <span class="keyword">in</span> nowplaying_list:</span><br><span class="line">    <span class="built_in">print</span>(<span class="built_in">str</span>(num)+<span class="string">&quot;:&quot;</span>+item[<span class="string">&#x27;name&#x27;</span>])</span><br><span class="line">    num=num+<span class="number">1</span></span><br><span class="line"></span><br><span class="line">i=<span class="built_in">int</span>(<span class="built_in">input</span>(<span class="string">&quot;请输入电影序号:&quot;</span>))</span><br><span class="line"></span><br><span class="line"><span class="comment"># 影片短评网址</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(<span class="number">10</span>):</span><br><span class="line">    page = (<span class="number">10</span> - <span class="number">1</span>) * <span class="number">20</span>  <span class="comment"># 获取10页评论信息</span></span><br><span class="line">    url1 = <span class="string">r&quot;https://movie.douban.com/subject/&quot;</span> + nowplaying_list[i - <span class="number">1</span>][<span class="string">&#x27;id&#x27;</span>] + <span class="string">&quot;/comments?start=&quot;</span> + <span class="built_in">str</span>(</span><br><span class="line">        page) + <span class="string">&quot;&amp;limit=20&quot;</span></span><br><span class="line">    <span class="comment"># url1=r&quot;https://movie.douban.com/subject/26826330/comments?start=0&amp;limit=20&quot;</span></span><br><span class="line">    headers = &#123;</span><br><span class="line">        <span class="string">&quot;User-Agent&quot;</span>: <span class="string">&quot;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.163 Safari/537.36 Edg/80.0.361.111&quot;</span>&#125;</span><br><span class="line">    <span class="comment"># headers=&#123;&quot;user-agent&quot;: &quot;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.163 Safari/537.36 Edg/80.0.361.111&quot;&#125;</span></span><br><span class="line">    req = requests.get(url1, headers=headers)</span><br><span class="line">    html1 = req.text  <span class="comment"># 获取评论网页数据</span></span><br><span class="line">    soup1 = bs(html1, <span class="string">&quot;html.parser&quot;</span>)</span><br><span class="line">    <span class="comment"># print(soup1)</span></span><br><span class="line">    comments = soup1.find(<span class="string">&quot;div&quot;</span>, class_=<span class="string">&quot;mod-bd&quot;</span>)</span><br><span class="line">    <span class="comment"># print(comments)</span></span><br><span class="line">    comment_lists = comments.find_all(<span class="string">&quot;div&quot;</span>, class_=<span class="string">&quot;comment-item&quot;</span>)  <span class="comment"># 获取电影存储所有短评的标签</span></span><br><span class="line">    <span class="comment"># print(comment_lists)</span></span><br><span class="line">    comment_list = []</span><br><span class="line">    <span class="keyword">for</span> comment_p <span class="keyword">in</span> comment_lists:</span><br><span class="line">        comment = comment_p.find_all(<span class="string">&#x27;p&#x27;</span>)[<span class="number">0</span>].text  <span class="comment"># 获取所有短评</span></span><br><span class="line">        <span class="keyword">if</span> comment <span class="keyword">is</span> <span class="keyword">not</span> <span class="literal">None</span>:</span><br><span class="line">            <span class="comment"># print(comment)</span></span><br><span class="line">            comment_list.append(comment)</span><br><span class="line"></span><br><span class="line"><span class="comment"># print(comment_list)</span></span><br><span class="line">com=<span class="string">&#x27;&#x27;</span></span><br><span class="line"><span class="keyword">for</span> k <span class="keyword">in</span> <span class="built_in">range</span>(<span class="built_in">len</span>(comment_list)):<span class="comment">#将所有评论数据转换为字符串</span></span><br><span class="line">    com=com+comment_list[k]</span><br><span class="line"></span><br><span class="line"><span class="comment">#清理数据</span></span><br><span class="line">pattern=re.<span class="built_in">compile</span>(<span class="string">r&#x27;[\u4e00-\u9fa5]+&#x27;</span>)<span class="comment">#正则匹配,去除数据中的换行符及其他无关符号</span></span><br><span class="line">filterdata=re.findall(pattern,com)</span><br><span class="line">cleaned_comments=<span class="string">&#x27;&#x27;</span>.join(filterdata)<span class="comment">#清理后得到的最终评论数据</span></span><br><span class="line"><span class="built_in">print</span>(cleaned_comments)</span><br><span class="line"></span><br><span class="line"><span class="comment">#提取关键词</span></span><br><span class="line"><span class="comment"># jieba.analyse.set_stop_words(&quot;D:\pythonProject1\spider_code\jieba_stop_words.txt&quot;)</span></span><br><span class="line">result=jieba.analyse.textrank(cleaned_comments,topK=<span class="number">50</span>,withWeight=<span class="literal">True</span>)<span class="comment">#对清理的数据提取出50个关键词，并显示每个关键词的权重比例</span></span><br><span class="line"><span class="comment"># result输出数据为以元组为元素的列表，故将元组转换为字典</span></span><br><span class="line">keywords=<span class="built_in">dict</span>()</span><br><span class="line"><span class="keyword">for</span> item <span class="keyword">in</span> result:</span><br><span class="line">    keywords[item[<span class="number">0</span>]]=item[<span class="number">1</span>]</span><br><span class="line"></span><br><span class="line">stopwords=<span class="string">&#x27;&#x27;</span><span class="comment">#存储对词频统计无意义不相关的词汇,即添加停用词(可自定义)</span></span><br><span class="line">f=<span class="built_in">open</span>(<span class="string">&#x27;D:\pythonProject1\spider_code\jieba_stop_words.txt&#x27;</span>,encoding=<span class="string">&quot;utf-8&quot;</span>)<span class="comment">#jieba_stop_words.txt,停用词字典数据(自定义)</span></span><br><span class="line"><span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">    word=f.readline()</span><br><span class="line">    <span class="keyword">if</span> word==<span class="string">&#x27;&#x27;</span>:</span><br><span class="line">        <span class="keyword">break</span></span><br><span class="line">    stopwords+=word</span><br><span class="line"><span class="comment"># print(stopwords)</span></span><br><span class="line"></span><br><span class="line">keywords=&#123;x:keywords[x] <span class="keyword">for</span> x <span class="keyword">in</span> keywords <span class="keyword">if</span> x <span class="keyword">not</span> <span class="keyword">in</span> stopwords&#125;<span class="comment">#将评论数据与停用词作比较,清理无意义的停用词</span></span><br><span class="line"><span class="built_in">print</span>(keywords)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 显示词云图</span></span><br><span class="line">plt.rcParams[<span class="string">&#x27;figure.figsize&#x27;</span>]=(<span class="number">10.0</span>,<span class="number">5.0</span>)<span class="comment">#设置图像显示大小</span></span><br><span class="line"><span class="comment"># 设置字体类型\颜色\大小</span></span><br><span class="line">wordcloud=WordCloud(font_path=<span class="string">&#x27;simhei.ttf&#x27;</span>,background_color=<span class="string">&#x27;white&#x27;</span>,max_font_size=<span class="number">80</span>,stopwords=stopwords)</span><br><span class="line">myword=wordcloud.fit_words(keywords)<span class="comment">#词云统计图</span></span><br><span class="line">plt.imshow(myword)<span class="comment">#显示词云图</span></span><br><span class="line">plt.axis(<span class="string">&quot;off&quot;</span>)</span><br><span class="line">plt.show()</span><br></pre></td></tr></table></figure>
