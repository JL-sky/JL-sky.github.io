        <p>本文介绍了python语言中正则表达式的使用</p>

<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># -*- codeing=utf-8 -*-</span></span><br><span class="line"><span class="comment"># @Author:姜磊</span></span><br><span class="line"><span class="comment"># 人间烟火气，最抚凡人心</span></span><br><span class="line"><span class="comment"># -*- coding: UTF-8 -*-</span></span><br><span class="line"><span class="keyword">import</span> re</span><br><span class="line">string = <span class="string">&#x27;small smell sm.ll smll smaall sm3ll smAll smaaaall sm\nll sm ll small smbll smbbll sm..ll sm**ll smaaaaaall&#x27;</span></span><br><span class="line"><span class="comment">#print(re.search(&quot;small&quot;,string))</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#匹配单个字符</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">print(re.findall(&quot;small&quot;,string))#查找所有匹配的字符</span></span><br><span class="line"><span class="string">print(re.findall(&quot;small|smell&quot;,string))#管道符，查找small或者smell</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm.ll&quot;,string))#.符号可以匹配任意一个字符</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[abcd]ll&quot;,string))#[]符号限定只匹配abcd中的字符</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[a-z]ll&quot;,string))#限定匹配所有的小写字母</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[a-zA-Z0-9]ll&quot;,string))#匹配小写字母，大写字母和数字</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm\.ll&quot;,string))#转义</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[^a]ll&quot;,string))#除了a以外的所有字符</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#量化符</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm.&#123;2&#125;ll&quot;,string))#任意一个字符匹配2两次</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[a-z]&#123;2,4&#125;ll&quot;,string))#匹配所有的小写字母出现2-4次</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[a-z]&#123;2,&#125;ll&quot;,string))#匹配所有的小写字母出现2次以上</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[a-z]?ll&quot;,string))#&#123;0,1&#125;</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[a-z]+ll&quot;,string))#&#123;1，&#125;</span></span><br><span class="line"><span class="string">print(re.findall(&quot;sm[a-z]*ll&quot;,string))#&#123;0，&#125;</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">eg=<span class="string">&quot;My name is jianglei.&quot;</span></span><br><span class="line">name0=<span class="string">&quot;My name is .+\.&quot;</span></span><br><span class="line">name=<span class="string">&quot;My name is (.+)\.&quot;</span><span class="comment">#()表示提取符合正则表达式的字符串中（）中的内容</span></span><br><span class="line"><span class="built_in">print</span>(re.findall(name0,eg))</span><br><span class="line"><span class="built_in">print</span>(re.findall(name,eg)[<span class="number">0</span>])</span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="string">rawdata = &#x27;</span></span><br><span class="line"><span class="string">555-1239</span></span><br><span class="line"><span class="string">Moe Szyslak</span></span><br><span class="line"><span class="string">(636) 555-0113</span></span><br><span class="line"><span class="string">Burns, C.Montgomery</span></span><br><span class="line"><span class="string">555-6542</span></span><br><span class="line"><span class="string">Rev. Timothy Lovejoy</span></span><br><span class="line"><span class="string">555 8904</span></span><br><span class="line"><span class="string">Ned Flanders</span></span><br><span class="line"><span class="string">636-555-3226</span></span><br><span class="line"><span class="string">Simpson,Homer</span></span><br><span class="line"><span class="string">5553642</span></span><br><span class="line"><span class="string">Dr. Julius Hibbert&#x27;</span></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27;</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">rawdata = <span class="string">&#x27;555-1239Moe Szyslak(636) 555-0113Burns, C.Montgomery555-6542Rev. Timothy Lovejoy555 8904Ned Flanders636-555-3226Simpson,Homer5553642Dr. Julius Hibbert&#x27;</span></span><br><span class="line"></span><br><span class="line">tel_pattern=<span class="string">&#x27;\(?[0-9]&#123;0,3&#125;\)?[ ]?[0-9]&#123;3&#125;[- ]?[0-9]&#123;4&#125;&#x27;</span></span><br><span class="line">tel=re.findall(tel_pattern,rawdata)</span><br><span class="line"><span class="comment">#print(tel)</span></span><br><span class="line"></span><br><span class="line">name_pattern=<span class="string">&#x27;[a-zA-Z]&#123;0,5&#125;[,\.]?[ ]?[a-zA-Z]&#123;1,7&#125;[\. ,][a-zA-Z]&#123;1,10&#125;&#x27;</span></span><br><span class="line">name=re.findall(name_pattern,rawdata)</span><br><span class="line"><span class="comment">#print(name)</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> pandas <span class="keyword">as</span> pd</span><br><span class="line">ans=pd.DataFrame(&#123;<span class="string">&#x27;name&#x27;</span>:name,<span class="string">&#x27;tel&#x27;</span>:tel&#125;)</span><br><span class="line"><span class="built_in">print</span>(ans)</span><br></pre></td></tr></table></figure>
