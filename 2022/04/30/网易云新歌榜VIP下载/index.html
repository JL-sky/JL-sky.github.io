        <p>本文介绍了如何通过python爬取网易云新歌榜歌曲及下载过程</p>
<span id="more"></span>


<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"><span class="keyword">from</span> bs4 <span class="keyword">import</span> BeautifulSoup <span class="keyword">as</span> bs</span><br><span class="line"></span><br><span class="line"><span class="comment"># # url=r&#x27;https://music.163.com/#/discover/toplist?id=3779629&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># # url = r&#x27;https://music.163.com/discover/toplist?id=3779629&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># # url=r&quot;https://music.163.com/discover/toplist?id=3778678&quot;</span></span><br><span class="line"></span><br><span class="line">url=<span class="string">r&quot;https://music.163.com/artist?id=88145&quot;</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># headers=&#123;&#x27;user-agent&#x27;: &#x27;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.163 Safari/537.36 Edg/80.0.361.111&#x27;&#125;</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 头部信息</span></span><br><span class="line"></span><br><span class="line">headers=&#123;<span class="string">&#x27;User-Agent&#x27;</span>: <span class="string">&#x27;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/99.0.4844.74 Safari/537.36 Edg/99.0.1150.52&#x27;</span>&#125;</span><br><span class="line"><span class="comment">#发送请求</span></span><br><span class="line">res=requests.get(url,headers=headers)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 获取返回html数据</span></span><br><span class="line"></span><br><span class="line">html=res.text</span><br><span class="line"></span><br><span class="line"><span class="comment"># 解析HTML文档</span></span><br><span class="line"></span><br><span class="line">soup=bs(html,<span class="string">&quot;html.parser&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># print(soup)</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 获取歌曲下载列表</span></span><br><span class="line"></span><br><span class="line">inf = soup.find(<span class="string">&#x27;ul&#x27;</span>, class_=<span class="string">&#x27;f-hide&#x27;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># print(inf)</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 获取所有歌曲的链接</span></span><br><span class="line"></span><br><span class="line">infor = inf.find_all(<span class="string">&#x27;a&#x27;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># print(infor)</span></span><br><span class="line"></span><br><span class="line">idlist=[]<span class="comment">#歌曲id号</span></span><br><span class="line">namelist=[]<span class="comment">#歌曲名称</span></span><br><span class="line">num=<span class="number">0</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> infor:</span><br><span class="line">    num=num+<span class="number">1</span></span><br><span class="line">    name = i.text<span class="comment">#获取a标签内容，即歌曲名称</span></span><br><span class="line">    namelist.append(name)</span><br><span class="line">    <span class="comment"># print(i)</span></span><br><span class="line">    href=i.get(<span class="string">&quot;href&quot;</span>)<span class="comment">#获取a标签下的href属性值</span></span><br><span class="line">    <span class="comment"># print(href)</span></span><br><span class="line">    <span class="built_in">id</span>=href[<span class="number">9</span>:]<span class="comment">#获取歌曲id号</span></span><br><span class="line">    idlist.append(<span class="built_in">id</span>)</span><br><span class="line">    url=<span class="string">&#x27;https://music.163.com/&#x27;</span>+href<span class="comment">#获取每首音乐的详情链接</span></span><br><span class="line">    <span class="built_in">print</span>(<span class="built_in">str</span>(num)+<span class="string">&#x27; &#x27;</span>+name+<span class="string">&#x27; &#x27;</span>+url)</span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">download</span>():</span><br><span class="line">    <span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">        a = <span class="built_in">input</span>(<span class="string">&quot;请输入你要下载歌曲的序号：&quot;</span>)</span><br><span class="line">        b = <span class="built_in">int</span>(a) - <span class="number">1</span></span><br><span class="line">        aa = idlist[b]    <span class="comment"># 取音乐id</span></span><br><span class="line">        fn = namelist[b]    <span class="comment"># 取音乐名</span></span><br><span class="line">        <span class="comment"># 定义请求路由 &gt; 下载播放链接</span></span><br><span class="line">        url = <span class="string">&#x27;http://music.163.com/song/media/outer/url?id=&#123;&#125;.mp3&#x27;</span>.<span class="built_in">format</span>(aa)  <span class="comment"># 破解</span></span><br><span class="line">        music = requests.get(url, headers=headers).content</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 文件下载</span></span><br><span class="line">        <span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">&#x27;D:\pythonProject1\graduate\music\&#123;&#125;.mp3&#x27;</span>.<span class="built_in">format</span>(fn), <span class="string">&#x27;wb&#x27;</span>) <span class="keyword">as</span> f:</span><br><span class="line">            f.write(music)</span><br><span class="line">            <span class="built_in">print</span>(fn + <span class="string">&#x27;   下载完毕&#x27;</span>)</span><br><span class="line"></span><br><span class="line">download()</span><br></pre></td></tr></table></figure>
